services:
  # Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nutri_prod_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-nutri}
    volumes:
      - postgres_prod_database:/var/lib/postgresql/data
    networks:
      - nutri_prod_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: always

  # GUI for Postgres
  pgweb:
    image: sosedoff/pgweb
    container_name: nutri_prod_pgweb
    environment:
      PGWEB_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-nutri}?sslmode=disable
    ports:
      - "${PGWEB_PORT:-8081}:8081"
    depends_on:
      - postgres
    networks:
      - nutri_prod_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: always

  # Backend API
  backend:
    image: mocdiep/nutri-backend:14042026_0412
    container_name: nutri_prod_backend
    command:
      [
        "uv",
        "run",
        "gunicorn",
        "nutri.api.main:app",
        "-w",
        "${BACKEND_WORKERS:-2}",
        "-k",
        "uvicorn.workers.UvicornWorker",
        "-b",
        "0.0.0.0:${BACKEND_PORT:-8000}",
      ]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-nutri}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT}
      POSTGRES_SERVER: ${POSTGRES_SERVER}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_API_ENDPOINT: ${GEMINI_API_ENDPOINT}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      TEMPERATURE: ${TEMPERATURE}
      LLM_PROVIDER: ${LLM_PROVIDER}
      MODEL_NAME: ${MODEL_NAME}
      MEM0_EMBEDDING_PROVIDER: ${MEM0_EMBEDDING_PROVIDER}
      MEM0_EMBEDDING_MODEL: ${MEM0_EMBEDDING_MODEL}
      MEM0_EMBEDDING_API_KEY: ${MEM0_EMBEDDING_API_KEY}
      MEM0_EMBEDDING_API_BASE: ${MEM0_EMBEDDING_API_BASE}
    depends_on:
      - postgres
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - nutri_prod_network
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3096M
    restart: always

  # Frontend (Nginx)
  frontend:
    image: mocdiep/nutri-frontend:14042026_0412
    container_name: nutri_prod_frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - VITE_API_URL=${API_URL:-http://backend:8000/api/v1}
    depends_on:
      - backend
    networks:
      - nutri_prod_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: always

volumes:
  postgres_prod_database:

networks:
  nutri_prod_network:
    driver: bridge
